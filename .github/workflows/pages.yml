name: Deploy privacy site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Hugo
        env:
          HUGO_VERSION: 0.163.3
        run: |
          curl -sfL -o "${{ runner.temp }}/hugo.tar.gz" "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          mkdir "${{ runner.temp }}/hugo"
          tar -C "${{ runner.temp }}/hugo" -xf "${{ runner.temp }}/hugo.tar.gz"
          echo "${{ runner.temp }}/hugo" >> "${GITHUB_PATH}"

      - name: Build
        working-directory: xtwitter-spam-blocker
        run: |
          rm -rf "$GITHUB_WORKSPACE/public"
          hugo \
            --destination "$GITHUB_WORKSPACE/public/xtwitter-spam-blocker" \
            --cacheDir "${{ runner.temp }}/hugo_cache" \
            --gc \
            --minify \
            --baseURL "https://${{ github.repository_owner }}.github.io/xtwitter-spam-blocker/"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
