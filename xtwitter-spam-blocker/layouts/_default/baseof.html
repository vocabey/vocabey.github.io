<!doctype html>
<html lang="{{ .Site.Language.Locale }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}Clean matching spam on X/Twitter and review risky accounts before blocking.{{ end }}">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
  <link rel="canonical" href="{{ .Permalink }}">
  <style>
    :root {
      color-scheme: light;
      --ink: #111827;
      --muted: #5f6b7a;
      --line: #d9e2ea;
      --panel: #ffffff;
      --soft: #f5f7fa;
      --brand: #18a0a6;
      --brand-dark: #0f6d73;
      --danger: #c93442;
      --warning: #b7791f;
      --shadow: 0 18px 44px rgba(17, 24, 39, 0.12);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: #ffffff;
      line-height: 1.65;
    }

    img {
      display: block;
      max-width: 100%;
      height: auto;
    }

    a {
      color: var(--brand-dark);
      text-decoration-thickness: 0.08em;
      text-underline-offset: 0.18em;
    }

    a:hover {
      color: #0b4f55;
    }

    :focus-visible {
      outline: 3px solid rgba(24, 160, 166, 0.35);
      outline-offset: 3px;
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 10;
      border-bottom: 1px solid rgba(217, 226, 234, 0.9);
      background: rgba(255, 255, 255, 0.94);
      backdrop-filter: blur(12px);
    }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      max-width: 1120px;
      margin: 0 auto;
      padding: 14px 24px;
    }

    .brand-link {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--ink);
      font-weight: 700;
      text-decoration: none;
      white-space: nowrap;
    }

    .brand-mark {
      width: 28px;
      height: 28px;
      border-radius: 8px;
    }

    .site-nav {
      display: flex;
      align-items: center;
      gap: 18px;
      font-size: 14px;
    }

    .site-nav a {
      color: var(--muted);
      text-decoration: none;
    }

    .site-nav a:hover {
      color: var(--ink);
    }

    .nav-cta {
      display: inline-flex;
      min-height: 38px;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius);
      padding: 0 14px;
      background: var(--ink);
      color: #ffffff !important;
      font-weight: 700;
    }

    .site-main {
      min-height: calc(100vh - 164px);
    }

    .hero {
      position: relative;
      overflow: hidden;
      border-bottom: 1px solid var(--line);
      background:
        linear-gradient(180deg, rgba(233, 251, 251, 0.78), rgba(255, 255, 255, 0.95)),
        #f7fbfb;
    }

    .hero-inner {
      position: relative;
      max-width: 1120px;
      margin: 0 auto;
      padding: 86px 24px 74px;
    }

    .hero-copy {
      display: grid;
      justify-items: center;
      min-width: 0;
      text-align: center;
    }

    .hero-brand {
      display: flex;
      align-items: center;
      gap: 16px;
      justify-content: center;
      margin-bottom: 24px;
    }

    .hero-icon {
      width: 68px;
      height: 68px;
      border-radius: 18px;
      box-shadow: 0 16px 34px rgba(15, 109, 115, 0.2);
    }

    .hero-name {
      margin: 0;
      color: var(--ink);
      font-size: 18px;
      font-weight: 800;
      line-height: 1.2;
    }

    .hero-category {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .eyebrow {
      margin: 0 0 14px;
      color: var(--brand-dark);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .hero h1 {
      max-width: 820px;
      margin: 0;
      font-size: 52px;
      line-height: 1.05;
      letter-spacing: 0;
    }

    .hero h1 span {
      display: block;
    }

    .hero-lede {
      max-width: 720px;
      margin: 24px 0 0;
      color: #2f3b49;
      font-size: 20px;
      line-height: 1.55;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      margin-top: 32px;
    }

    .button {
      display: inline-flex;
      min-height: 46px;
      align-items: center;
      justify-content: center;
      border: 1px solid transparent;
      border-radius: var(--radius);
      padding: 0 18px;
      font-weight: 800;
      text-decoration: none;
    }

    .button-primary {
      background: var(--ink);
      color: #ffffff;
      box-shadow: 0 10px 24px rgba(17, 24, 39, 0.18);
    }

    .button-secondary {
      border-color: rgba(17, 24, 39, 0.18);
      background: rgba(255, 255, 255, 0.8);
      color: var(--ink);
    }

    .hero-feature-label {
      margin: 48px 0 18px;
      color: var(--brand-dark);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .hero-feature-list {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
    }

    .hero-feature,
    .feature-card,
    .doc-card,
    .screenshot-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.92);
    }

    .hero-feature {
      padding: 18px;
      background: rgba(255, 255, 255, 0.78);
    }

    .hero-feature strong {
      display: block;
      margin-bottom: 4px;
      font-size: 15px;
    }

    .hero-feature span {
      color: var(--muted);
      font-size: 14px;
    }

    .section {
      max-width: 1120px;
      margin: 0 auto;
      padding: 72px 24px;
    }

    .section + .section {
      border-top: 1px solid var(--line);
    }

    .section-header {
      max-width: 920px;
      margin-bottom: 32px;
    }

    .section-header h2,
    .article h2 {
      margin: 0 0 12px;
      font-size: 30px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .section-header p {
      margin: 0;
      color: var(--muted);
      font-size: 17px;
    }

    .feature-grid,
    .doc-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }

    .feature-card,
    .doc-card {
      padding: 22px;
      box-shadow: 0 8px 24px rgba(17, 24, 39, 0.06);
    }

    .feature-card h3,
    .doc-card h3 {
      margin: 0 0 8px;
      font-size: 18px;
      line-height: 1.3;
    }

    .feature-card p,
    .doc-card p {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
    }

    .doc-card a {
      color: var(--ink);
      text-decoration: none;
    }

    .doc-card a:hover {
      color: var(--brand-dark);
    }

    .screenshot-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .screenshot-card {
      overflow: hidden;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .screenshot-card img {
      width: 100%;
      aspect-ratio: 16 / 10;
      object-fit: cover;
    }

    .screenshot-card figcaption {
      padding: 14px 16px 16px;
      color: var(--muted);
      font-size: 14px;
    }

    .article-shell {
      max-width: 1120px;
      margin: 0 auto;
      padding: 40px 24px 72px;
    }

    .article-layout {
      display: grid;
      grid-template-columns: minmax(0, 760px) 260px;
      gap: 60px;
      align-items: start;
    }

    .article {
      min-width: 0;
    }

    .article h1 {
      margin: 0 0 24px;
      font-size: 38px;
      line-height: 1.14;
      letter-spacing: 0;
    }

    .article h2 {
      margin-top: 42px;
      font-size: 24px;
    }

    .article h3 {
      margin-top: 32px;
      font-size: 18px;
    }

    .article p,
    .article li {
      color: #334155;
    }

    .article code {
      border-radius: 5px;
      background: #eef5f6;
      padding: 0.08em 0.32em;
      color: #0f4f55;
      font-size: 0.92em;
    }

    .side-nav {
      position: sticky;
      top: 90px;
      border-left: 1px solid var(--line);
      padding-left: 18px;
      font-size: 14px;
    }

    .side-nav-title {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .side-nav ul {
      display: grid;
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .side-nav a {
      color: var(--muted);
      text-decoration: none;
    }

    .side-nav a:hover,
    .side-nav a[aria-current="page"] {
      color: var(--ink);
    }

    .site-footer {
      border-top: 1px solid var(--line);
      background: var(--soft);
    }

    .footer-inner {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 16px;
      max-width: 1120px;
      margin: 0 auto;
      padding: 28px 24px;
      color: var(--muted);
      font-size: 14px;
    }

    .footer-links {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
    }

    .footer-links a {
      color: var(--muted);
      text-decoration: none;
    }

    .footer-links a:hover {
      color: var(--ink);
    }

    @media (max-width: 860px) {
      .header-inner {
        align-items: flex-start;
        flex-direction: column;
        gap: 12px;
      }

      .site-nav {
        width: 100%;
        overflow-x: auto;
        padding-bottom: 3px;
      }

      .hero {
        min-height: auto;
      }

      .hero-inner {
        padding-top: 72px;
      }

      .hero h1 {
        font-size: 44px;
      }

      .feature-grid,
      .hero-feature-list,
      .doc-grid,
      .screenshot-grid,
      .article-layout {
        grid-template-columns: 1fr;
      }

      .side-nav {
        position: static;
        border-left: 0;
        border-top: 1px solid var(--line);
        padding: 24px 0 0;
      }
    }

    @media (max-width: 560px) {
      .site-nav {
        gap: 14px;
        font-size: 13px;
      }

      .nav-cta {
        min-height: 34px;
      }

      .hero h1 {
        font-size: 36px;
      }

      .hero-lede {
        font-size: 18px;
      }

      .section,
      .article-shell {
        padding-left: 18px;
        padding-right: 18px;
      }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="brand-link" href="{{ "" | relURL }}" aria-label="X/Twitter Spam Blocker home">
        <img class="brand-mark" src="{{ "images/app-icon-128.png" | relURL }}" alt="" width="28" height="28">
        <span>X/Twitter Spam Blocker</span>
      </a>
      <nav class="site-nav" aria-label="Primary navigation">
        <a href="{{ "features/" | relURL }}">Features</a>
        <a href="{{ "getting-started/" | relURL }}">Getting Started</a>
        <a href="{{ "how-it-works/" | relURL }}">How It Works</a>
        <a href="{{ "faq/" | relURL }}">FAQ</a>
        <a class="nav-cta" href="https://chromewebstore.google.com/detail/dblhngajkkliljhlnilajjifnilkbjnb?utm_source=item-share-cb" target="_blank" rel="noopener noreferrer">Install</a>
      </nav>
    </div>
  </header>
  <main class="site-main">
    {{ block "main" . }}{{ end }}
  </main>
  <footer class="site-footer">
    <div class="footer-inner">
      <div>X/Twitter Spam Blocker is independent and not affiliated with X Corp. or Twitter.</div>
      <nav class="footer-links" aria-label="Footer navigation">
        <a href="{{ "privacy/" | relURL }}">Privacy Policy</a>
        <a href="{{ "safety-and-limitations/" | relURL }}">Safety</a>
        <a href="{{ "support/" | relURL }}">Support</a>
      </nav>
    </div>
  </footer>
</body>
</html>
