  <!doctype html>
  <html lang="{{ .Site.Language.Locale }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
    <link rel="canonical" href="{{ .Permalink }}">
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #111827;
        background: #ffffff;
        line-height: 1.65;
      }
      main {
        max-width: 760px;
        margin: 0 auto;
        padding: 48px 24px 72px;
      }
      h1, h2 {
        line-height: 1.25;
      }
      h1 {
        font-size: 32px;
        margin-bottom: 24px;
      }
      h2 {
        font-size: 22px;
        margin-top: 36px;
      }
      a {
        color: #2563eb;
      }
    </style>
  </head>
  <body>
    <main>
      {{ block "main" . }}{{ end }}
    </main>
  </body>
  </html>
